<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Slot Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        header h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .slot-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .slot-title {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .image-box {
            width: 100%;
            height: 160px;
            background-color: #0b0f19;
            border: 2px dashed #475569;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-placeholder {
            color: #64748b;
            font-size: 0.85rem;
            text-align: center;
            padding: 10px;
        }

        .file-input {
            display: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .input-wrapper {
            display: flex;
            gap: 6px;
        }

        input[type="text"], input[type="tel"] {
            flex: 1;
            padding: 8px 12px;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-action {
            background-color: var(--accent-color);
        }

        .btn-wa {
            background-color: var(--success-color);
        }

        .btn-danger {
            background-color: var(--danger-color);
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Slot Tracker Pro</h1>
        <p>ছবি, লিংক এবং হোয়াটসঅ্যাপ/একাউন্ট নম্বর ট্র্যাকিং সিস্টেম</p>
    </header>

    <div class="slots-grid" id="slotsContainer">
        </div>
</div>

<script>
    // আপনি এখানে স্লটের সংখ্যা কাস্টমাইজ করতে পারেন (যেমন: ১২, ২০ বা ২৪টি)
    const TOTAL_SLOTS = 16; 
    const slotsContainer = document.getElementById('slotsContainer');

    // পেজ লোড হওয়ার সময় স্লটগুলো জেনারেট করা
    function initTracker() {
        for (let i = 1; i <= TOTAL_SLOTS; i++) {
            createSlotCard(i);
            loadSlotData(i);
        }
    }

    // একটি স্লট কার্ডের HTML তৈরি করা
    function createSlotCard(id) {
        const card = document.createElement('div');
        card.className = 'slot-card';
        card.innerHTML = `
            <div class="slot-header">
                <span class="slot-title">Slot ${id}</span>
            </div>
            
            <div class="image-box" onclick="document.getElementById('file-${id}').click()">
                <div class="image-placeholder" id="placeholder-${id}">📸 ক্লিক করে ছবি আপলোড করুন</div>
                <img id="view-img-${id}" style="display:none;" src="" alt="Slot Image">
            </div>
            <input type="file" id="file-${id}" class="file-input" accept="image/*" onchange="uploadAndCompress(event, ${id})">
            
            <div class="input-group">
                <label>লিংক / ইউআরএল:</label>
                <div class="input-wrapper">
                    <input type="text" id="link-${id}" placeholder="https://..." oninput="saveTextData(${id})">
                    <button class="btn btn-action" onclick="openLink(${id})">Open</button>
                </div>
            </div>

            <div class="input-group">
                <label>অ্যাকাউন্ট / WhatsApp নম্বর:</label>
                <div class="input-wrapper">
                    <input type="tel" id="number-${id}" placeholder="নম্বর লিখুন..." oninput="saveTextData(${id})">
                    <button class="btn btn-wa" onclick="openWhatsApp(${id})" title="সরাসরি হোয়াটসঅ্যাপ করুন">WA</button>
                </div>
            </div>

            <button class="btn btn-danger" onclick="clearSlot(${id})">Clear Slot</button>
        `;
        slotsContainer.appendChild(card);
    }

    // ইমেজ আপলোড এবং কম্প্রেস করা (Local Storage সাইজ বাঁচানোর জন্য)
    function uploadAndCompress(event, id) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // ছবির সাইজ অপটিমাইজেশন (সর্বোচ্চ ৪০০ পিক্সেল চওড়া)
                const MAX_WIDTH = 400;
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // কোয়ালিটি ০.৫ এ সেট করা হয়েছে যাতে স্টোরেজ ফুল না হয়
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
                
                // ডিসপ্লে আপডেট
                displayImage(id, compressedBase64);
                
                // লোকাল স্টোরেজে সেভ
                localStorage.setItem(`slot_${id}_img`, compressedBase64);
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    // ছবি দেখানোর ফাংশন
    function displayImage(id, src) {
        const placeholder = document.getElementById(`placeholder-${id}`);
        const imgView = document.getElementById(`view-img-${id}`);
        if(src) {
            placeholder.style.display = 'none';
            imgView.src = src;
            imgView.style.display = 'block';
        } else {
            placeholder.style.display = 'block';
            imgView.style.display = 'none';
            imgView.src = '';
        }
    }

    // টেক্সট ইনপুট (লিংক ও নম্বর) লোকাল স্টোরেজে সেভ করা
    function saveTextData(id) {
        const linkVal = document.getElementById(`link-${id}`).value;
        const numVal = document.getElementById(`number-${id}`).value;
        
        localStorage.setItem(`slot_${id}_link`, linkVal);
        localStorage.setItem(`slot_${id}_num`, numVal);
    }

    // লোকাল স্টোরেজ থেকে ডেটা লোড করা
    function loadSlotData(id) {
        const savedImg = localStorage.getItem(`slot_${id}_img`);
        const savedLink = localStorage.getItem(`slot_${id}_link`);
        const savedNum = localStorage.getItem(`slot_${id}_num`);

        if (savedImg) displayImage(id, savedImg);
        if (savedLink) document.getElementById(`link-${id}`).value = savedLink;
        if (savedNum) document.getElementById(`number-${id}`).value = savedNum;
    }

    // লিংক ওপেন করা
    function openLink(id) {
        const url = document.getElementById(`link-${id}`).value;
        if (url) {
            window.open(url, '_blank');
        } else {
            alert('কোনো লিংক সেভ করা নেই!');
        }
    }

    // সরাসরি WhatsApp চ্যাট ওপেন করা
    function openWhatsApp(id) {
        let num = document.getElementById(`number-${id}`).value;
        if (num) {
            // শুধুমাত্র সংখ্যাগুলো আলাদা করা
            num = num.replace(/\D/g, '');
            // বাংলাদেশের কান্ট্রি কোড না থাকলে যুক্ত করা
            if (num.length === 11 && num.startsWith('01')) {
                num = '88' + num;
            }
            window.open(`https://wa.me/${num}`, '_blank');
        } else {
            alert('কোনো নম্বর সেভ করা নেই!');
        }
    }

    // একটি নির্দিষ্ট স্লটের সব ডেটা ক্লিয়ার করা
    function clearSlot(id) {
        if(confirm(`আপনি কি নিশ্চিতভাবে Slot ${id} এর সব তথ্য মুছে ফেলতে চান?`)) {
            localStorage.removeItem(`slot_${id}_img`);
            localStorage.removeItem(`slot_${id}_link`);
            localStorage.removeItem(`slot_${id}_num`);
            
            displayImage(id, null);
            document.getElementById(`link-${id}`).value = '';
            document.getElementById(`number-${id}`).value = '';
            document.getElementById(`file-${id}`).value = '';
        }
    }

    // ট্র্যাকার রান করা
    initTracker();
</script>

</body>
</html>
