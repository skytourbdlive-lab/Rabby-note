<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Slot Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --border-color: #334155;
            --input-bg: #0b0f19;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        header h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .slot-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.2);
        }

        /* Editable Slot Name */
        .slot-name-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--border-color);
            color: var(--accent-color);
            font-size: 1.2rem;
            font-weight: bold;
            padding: 5px 0;
            outline: none;
        }
        .slot-name-input:focus {
            border-bottom-color: var(--accent-color);
        }

        .image-box {
            width: 100%;
            height: 160px;
            background-color: var(--input-bg);
            border: 2px dashed #475569;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-placeholder {
            color: #64748b;
            font-size: 0.85rem;
            text-align: center;
            padding: 10px;
        }

        .file-input { display: none; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .input-wrapper {
            display: flex;
            gap: 6px;
        }

        input[type="text"], input[type="tel"], input[type="number"] {
            flex: 1;
            padding: 8px 10px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: var(--accent-color); }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .btn-action { background-color: var(--accent-color); }
        .btn-wa { background-color: #25D366; font-size: 1.1rem; padding: 8px 15px;}
        .btn-danger { background-color: var(--danger-color); width: 100%; margin-top: 5px;}

        /* Tracker Section */
        .tracker-box {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            margin-top: 5px;
        }

        .tracker-title {
            font-size: 0.8rem;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
        }

        .tracker-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tracker-result {
            font-size: 0.85rem;
            background-color: var(--input-bg);
            padding: 6px;
            border-radius: 4px;
            text-align: center;
            color: #e2e8f0;
        }

        .highlight-money { color: var(--warning-color); font-weight: bold; font-size: 1rem;}
        .highlight-view { color: var(--accent-color); font-weight: bold; font-size: 1rem;}

        /* Hide Number Arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Slot Tracker Pro Max</h1>
        <p>লাইভ হিসাব, ভিউ ট্র্যাকিং, ছবি, লিংক এবং হোয়াটসঅ্যাপ প্যানেল</p>
    </header>

    <div class="slots-grid" id="slotsContainer">
        </div>
</div>

<script>
    const TOTAL_SLOTS = 16; // স্লটের সংখ্যা
    const slotsContainer = document.getElementById('slotsContainer');

    function initTracker() {
        for (let i = 1; i <= TOTAL_SLOTS; i++) {
            createSlotCard(i);
            loadSlotData(i);
        }
    }

    function createSlotCard(id) {
        const card = document.createElement('div');
        card.className = 'slot-card';
        card.innerHTML = `
            <input type="text" class="slot-name-input" id="name-${id}" placeholder="স্লটের নাম লিখুন (যেমন: Slot ${id})" oninput="saveData(${id})">
            
            <div class="image-box" onclick="document.getElementById('file-${id}').click()">
                <div class="image-placeholder" id="placeholder-${id}">📸 ক্লিক করে ছবি আপলোড করুন</div>
                <img id="view-img-${id}" style="display:none;" src="" alt="Slot Image">
            </div>
            <input type="file" id="file-${id}" class="file-input" accept="image/*" onchange="uploadAndCompress(event, ${id})">
            
            <div class="input-group">
                <label>লিংক / ইউআরএল:</label>
                <div class="input-wrapper">
                    <input type="text" id="link-${id}" placeholder="https://..." oninput="saveData(${id})">
                    <button class="btn btn-action" onclick="openLink(${id})">Open</button>
                </div>
            </div>

            <div class="input-group">
                <label>অ্যাকাউন্ট / WhatsApp নম্বর:</label>
                <div class="input-wrapper">
                    <input type="tel" id="number-${id}" placeholder="নম্বর লিখুন..." oninput="saveData(${id})">
                    <button class="btn btn-wa" onclick="openWhatsApp(${id})" title="হোয়াটসঅ্যাপে মেসেজ দিন"><i class="fab fa-whatsapp"></i></button>
                </div>
            </div>

            <div class="tracker-box">
                <div class="tracker-title">টাকা / পেমেন্ট হিসাব</div>
                <div class="tracker-grid">
                    <input type="number" id="target-money-${id}" placeholder="টার্গেট (৳)" oninput="calcMoney(${id})">
                    <input type="number" id="paid-money-${id}" placeholder="জমা (৳)" oninput="calcMoney(${id})">
                </div>
                <div class="tracker-result">বাকি আছে: <span id="due-money-${id}" class="highlight-money">0</span> ৳</div>
            </div>

            <div class="tracker-box">
                <div class="tracker-title">ভিডিও ভিউ ট্র্যাকিং</div>
                <div class="tracker-grid">
                    <input type="number" id="target-view-${id}" placeholder="টার্গেট ভিউ" oninput="calcViews(${id})">
                    <input type="number" id="current-view-${id}" placeholder="বর্তমান ভিউ" oninput="calcViews(${id})">
                </div>
                <div class="tracker-result">বাকি ভিউ: <span id="due-view-${id}" class="highlight-view">0</span></div>
            </div>

            <button class="btn btn-danger" onclick="clearSlot(${id})">Clear All Data</button>
        `;
        slotsContainer.appendChild(card);
    }

    // ইমেজ আপলোড
    function uploadAndCompress(event, id) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const MAX_WIDTH = 400;
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
                
                displayImage(id, compressedBase64);
                localStorage.setItem(`slot_${id}_img`, compressedBase64);
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    function displayImage(id, src) {
        const placeholder = document.getElementById(`placeholder-${id}`);
        const imgView = document.getElementById(`view-img-${id}`);
        if(src) {
            placeholder.style.display = 'none';
            imgView.src = src;
            imgView.style.display = 'block';
        } else {
            placeholder.style.display = 'block';
            imgView.style.display = 'none';
            imgView.src = '';
        }
    }

    // হিসাব নিকাশ লাইভ আপডেট ও সেভ করা (টাকা)
    function calcMoney(id) {
        let target = parseFloat(document.getElementById(`target-money-${id}`).value) || 0;
        let paid = parseFloat(document.getElementById(`paid-money-${id}`).value) || 0;
        let due = target - paid;
        
        document.getElementById(`due-money-${id}`).innerText = due;
        saveData(id); // অটো সেভ
    }

    // হিসাব নিকাশ লাইভ আপডেট ও সেভ করা (ভিউ)
    function calcViews(id) {
        let target = parseFloat(document.getElementById(`target-view-${id}`).value) || 0;
        let current = parseFloat(document.getElementById(`current-view-${id}`).value) || 0;
        let due = target - current;
        
        document.getElementById(`due-view-${id}`).innerText = due;
        saveData(id); // অটো সেভ
    }

    // সব ডাটা একসাথে সেভ করা
    function saveData(id) {
        localStorage.setItem(`slot_${id}_name`, document.getElementById(`name-${id}`).value);
        localStorage.setItem(`slot_${id}_link`, document.getElementById(`link-${id}`).value);
        localStorage.setItem(`slot_${id}_num`, document.getElementById(`number-${id}`).value);
        
        localStorage.setItem(`slot_${id}_tMoney`, document.getElementById(`target-money-${id}`).value);
        localStorage.setItem(`slot_${id}_pMoney`, document.getElementById(`paid-money-${id}`).value);
        
        localStorage.setItem(`slot_${id}_tView`, document.getElementById(`target-view-${id}`).value);
        localStorage.setItem(`slot_${id}_cView`, document.getElementById(`current-view-${id}`).value);
    }

    // লোড ডাটা
    function loadSlotData(id) {
        const img = localStorage.getItem(`slot_${id}_img`);
        if (img) displayImage(id, img);

        document.getElementById(`name-${id}`).value = localStorage.getItem(`slot_${id}_name`) || '';
        document.getElementById(`link-${id}`).value = localStorage.getItem(`slot_${id}_link`) || '';
        document.getElementById(`number-${id}`).value = localStorage.getItem(`slot_${id}_num`) || '';
        
        document.getElementById(`target-money-${id}`).value = localStorage.getItem(`slot_${id}_tMoney`) || '';
        document.getElementById(`paid-money-${id}`).value = localStorage.getItem(`slot_${id}_pMoney`) || '';
        
        document.getElementById(`target-view-${id}`).value = localStorage.getItem(`slot_${id}_tView`) || '';
        document.getElementById(`current-view-${id}`).value = localStorage.getItem(`slot_${id}_cView`) || '';

        // ভ্যালু বসানোর পর লাইভ হিসাবটা আবার আপডেট করা
        calcMoney(id);
        calcViews(id);
    }

    function openLink(id) {
        const url = document.getElementById(`link-${id}`).value;
        if (url) window.open(url, '_blank');
        else alert('কোনো লিংক সেভ করা নেই!');
    }

    function openWhatsApp(id) {
        let num = document.getElementById(`number-${id}`).value;
        if (num) {
            num = num.replace(/\D/g, '');
            if (num.length === 11 && num.startsWith('01')) num = '88' + num;
            window.open(`https://wa.me/${num}`, '_blank');
        } else {
            alert('কোনো নম্বর সেভ করা নেই!');
        }
    }

    function clearSlot(id) {
        if(confirm(`সব ডাটা মুছে ফেলতে চান?`)) {
            // Remove from local storage
            const keys = ['img', 'name', 'link', 'num', 'tMoney', 'pMoney', 'tView', 'cView'];
            keys.forEach(k => localStorage.removeItem(`slot_${id}_${k}`));
            
            // Clear inputs
            displayImage(id, null);
            document.getElementById(`name-${id}`).value = '';
            document.getElementById(`link-${id}`).value = '';
            document.getElementById(`number-${id}`).value = '';
            document.getElementById(`target-money-${id}`).value = '';
            document.getElementById(`paid-money-${id}`).value = '';
            document.getElementById(`target-view-${id}`).value = '';
            document.getElementById(`current-view-${id}`).value = '';
            
            calcMoney(id);
            calcViews(id);
        }
    }

    initTracker();
</script>

</body>
</html>
